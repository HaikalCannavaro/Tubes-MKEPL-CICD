## YAML Template.
---
name: Continuous Integration
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: temurin
        cache: maven

    - name: Maven Compile
      run: mvn clean compile